name: Discord Commit Webhook

on:
  push:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send one webhook per commit
        run: |
          jq -c '.commits[]' "$GITHUB_EVENT_PATH" | while read -r commit; do

            payload=$(jq -n \
              --arg ref "$(jq -r '.ref' "$GITHUB_EVENT_PATH")" \
              --arg repo "$(jq -r '.repository.full_name' "$GITHUB_EVENT_PATH")" \
              --arg pusher "$(jq -r '.pusher.name' "$GITHUB_EVENT_PATH")" \
              --argjson commit "$commit" '
              {
                ref: $ref,
                repository: {
                  full_name: $repo
                },
                pusher: {
                  name: $pusher
                },
                commit: {
                  id: $commit.id,
                  message: $commit.message,
                  timestamp: $commit.timestamp,
                  url: $commit.url,
                  added: $commit.added,
                  removed: $commit.removed,
                  modified: $commit.modified,
                  distinct: $commit.distinct,
                  author: {
                    name: $commit.author.name,
                    username: $commit.author.username
                  }
                }
              }'
            )

            printf '%s' "$payload" > payload.json

            echo "Sending commit:"
            echo "$payload"

            signature=$(openssl dgst -sha256 \
              -hmac "${{ secrets._GITHUB_WEBHOOK_SECRET }}" \
              payload.json | sed 's/^.* //')

            curl -4 -X POST \
              --silent --show-error --fail-with-body \
              --connect-timeout 5 --max-time 15 \
              --retry 3 --retry-all-errors --retry-delay 2 \
              --write-out "\nHTTP %{http_code}\n" \
              -H "Content-Type: application/json" \
              -H "X-GitHub-Event: push" \
              -H "X-Hub-Signature-256: sha256=$signature" \
              --data-binary @payload.json \
              "${{ secrets.DISCORD_WEBHOOK_ENDPOINT }}"

          done