name: Discord Commit Webhook
on:
  push:
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send payload
        run: |
          payload=$(jq -c '{
            ref,
            repository: { full_name: .repository.full_name },
            pusher: { name: .pusher.name },
            commits: [(.commits[] | {
              id,
              message,
              timestamp,
              url,
              added,
              removed,
              modified,
              distinct,
              author: { name: .author.name, username: .author.username }
            })]
          }' "$GITHUB_EVENT_PATH")
          signature=$(printf "%s" "$payload" | openssl dgst -sha256 -hmac "${{ secrets._GITHUB_WEBHOOK_SECRET }}" | sed 's/^.* //')
          echo "Payload: $payload"
          echo "Signature: $signature"
          curl -4 -X POST \
            --silent --show-error --fail-with-body \
            --connect-timeout 5 --max-time 15 \
            --retry 3 --retry-all-errors --retry-delay 2 \
            --write-out "\nHTTP %{http_code}\n" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -H "X-Hub-Signature-256: sha256=$signature" \
            --data-binary "$payload" \
            ${{ secrets.DISCORD_WEBHOOK_ENDPOINT }}
